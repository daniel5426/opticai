name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

# Add permissions for the workflow
permissions:
  contents: write
  packages: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci

      - name: Generate production environment file
        run: |
          cat > .env.production <<'EOF'
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          DOWNLOAD_PAGE_URL=${{ secrets.DOWNLOAD_PAGE_URL }}
          GOOGLE_DESKTOP_CLIENT_ID=${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
          EOF

      - name: Build for macOS arm64
        run: |
          npx vite build
          npx electron-builder --mac --arm64 --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci

      - name: Generate Windows production environment file
        shell: pwsh
        run: |
          @"
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          DOWNLOAD_PAGE_URL=${{ secrets.DOWNLOAD_PAGE_URL }}
          GOOGLE_DESKTOP_CLIENT_ID=${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
          "@ | Set-Content -Path .env.production -NoNewline

          Copy-Item -Path .env.production -Destination .env.windows.production

      - name: Build for Windows
        run: |
          npx vite build
          npx electron-builder --win --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe
            release/Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe.blockmap
            release/latest.yml
          if-no-files-found: error

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## Release v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **macOS Apple Silicon (M1/M2/M3)**: `Prysm-darwin-arm64-${{ steps.version.outputs.VERSION }}.zip`
            - **macOS Intel**: `Prysm-darwin-x64-${{ steps.version.outputs.VERSION }}.zip`
            - **Windows**: `Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe`

            ### Auto-Update Support
            This release includes update support. Windows builds can download and install updates in-app after the first manual install.

            ### Installation

            #### macOS
            1. Download the appropriate ZIP for your Mac.
            2. Extract the ZIP file.
            3. Move Prysm.app to your Applications folder.
            4. First time opening: right-click Prysm.app, then choose Open.

            #### Windows
            1. Download `Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe`.
            2. Run the installer.
            3. Future updates can be downloaded and installed from inside the app.
          files: |
            release-artifacts/macos-release/*.zip
            release-artifacts/macos-release/latest-mac.yml
            release-artifacts/windows-release/Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe
            release-artifacts/windows-release/Prysm-Setup-${{ steps.version.outputs.VERSION }}.exe.blockmap
            release-artifacts/windows-release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
