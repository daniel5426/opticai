name: Backend Railway Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-railway.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Railway environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run backend release-gate tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
        run: >
          python -m pytest
          backend/tests/test_production_hardening.py
          backend/tests/test_files_api.py
          backend/tests/test_default_exam_layout_seeds.py

  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway staging
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway up \
            --ci \
            --project fb97ce50-fb72-4612-bfd1-c6d8a7bed9cb \
            --environment staging \
            --service opticai \
            --message "Staging backend deploy $GITHUB_SHA"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway production
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          railway up \
            --ci \
            --project fb97ce50-fb72-4612-bfd1-c6d8a7bed9cb \
            --environment production \
            --service opticai \
            --message "Production backend deploy $GITHUB_SHA"
